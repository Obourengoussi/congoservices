{% extends "base.html" %}

{% block title %}Inscription - CongoServices{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">

        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="auth-card card border-0 shadow-lg">

                    <div class="card-body p-5">

                        <!-- Header -->
                        <div class="text-center mb-4">
                            <i class="bi bi-geo-alt-fill display-4 text-primary"></i>

                            <h3 class="mt-3">
                                Créer un compte
                            </h3>

                            <p class="text-muted">
                                Rejoignez CongoServices gratuitement
                            </p>
                        </div>

                        <!-- FORM -->
                        <form method="POST"
                              action="{{ url_for('register') }}"
                              autocomplete="off">

                            <!-- CSRF -->
                            <input type="hidden"
                                   name="csrf_token"
                                   value="{{ csrf_token() }}">

                            <!-- Username + Email -->
                            <div class="row g-3">

                                <div class="col-md-6">
                                    <label for="username" class="form-label">
                                        Nom d'utilisateur
                                    </label>

                                    <input type="text"
                                           class="form-control"
                                           id="username"
                                           name="username"
                                           placeholder="monpseudo"
                                           minlength="3"
                                           maxlength="30"
                                           autocomplete="username"
                                           spellcheck="false"
                                           required>
                                </div>

                                <div class="col-md-6">
                                    <label for="email" class="form-label">
                                        Email
                                    </label>

                                    <input type="email"
                                           class="form-control"
                                           id="email"
                                           name="email"
                                           placeholder="votre@email.com"
                                           maxlength="120"
                                           autocomplete="email"
                                           required>
                                </div>
                            </div>

                            <!-- Password -->
                            <div class="mb-3 mt-3">

                                <label for="password" class="form-label">
                                    Mot de passe
                                </label>

                                <div class="input-group">

                                    <input type="password"
                                           class="form-control"
                                           id="password"
                                           name="password"
                                           placeholder="Minimum 8 caractères"
                                           minlength="8"
                                           maxlength="128"
                                           autocomplete="new-password"
                                           required>

                                    <button class="btn btn-outline-secondary"
                                            type="button"
                                            id="togglePassword">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>

                                <div class="form-text">
                                    Utilisez au moins 8 caractères avec lettres et chiffres.
                                </div>
                            </div>

                            <!-- Role -->
                            <div class="mb-3">

                                <label for="role" class="form-label">
                                    Je suis...
                                </label>

                                <select class="form-select"
                                        id="role"
                                        name="role"
                                        required>

                                    <option value="utilisateur">
                                        Un client recherchant des services
                                    </option>

                                    <option value="prestataire">
                                        Un prestataire de services
                                    </option>
                                </select>
                            </div>

                            <!-- CGU -->
                            <div class="mb-4 form-check">

                                <input type="checkbox"
                                       class="form-check-input"
                                       id="cgu"
                                       name="cgu"
                                       required>

                                <label class="form-check-label" for="cgu">
                                    J'accepte les
                                    <a href="{{ url_for('cgu') }}"
                                       target="_blank"
                                       rel="noopener noreferrer">
                                        conditions générales
                                    </a>
                                </label>
                            </div>

                            <!-- Submit -->
                            <button type="submit"
                                    class="btn btn-primary w-100 py-2">
                                <i class="bi bi-person-plus me-2"></i>
                                Créer mon compte
                            </button>
                        </form>

                        <!-- Login -->
                        <div class="text-center mt-4">

                            <p class="text-muted">
                                Déjà inscrit ?
                            </p>

                            <a href="{{ url_for('login') }}"
                               class="btn btn-outline-primary">
                                Se connecter
                            </a>
                        </div>

                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

<!-- SCRIPT -->
<script>
document.addEventListener('DOMContentLoaded', function () {

    const togglePassword = document.getElementById('togglePassword');

    if (togglePassword) {

        togglePassword.addEventListener('click', function () {

            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');

            if (passwordInput.type === 'password') {

                passwordInput.type = 'text';

                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');

            } else {

                passwordInput.type = 'password';

                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });
    }
});
</script>

{% endblock %}
