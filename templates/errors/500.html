{% extends "base.html" %}

{% block title %}
Erreur serveur - CongoServices
{% endblock %}

{% block content %}
<div class="error-page">

    <div class="container">

        <div class="error-box shadow-sm">

            <!-- ICON -->
            <div class="error-icon text-danger">
                <i class="bi bi-x-circle-fill"></i>
            </div>

            <!-- CODE -->
            <h1 class="error-code text-danger">
                500
            </h1>

            <!-- TITLE -->
            <h2 class="fw-bold mb-3">
                Erreur serveur
            </h2>

            <!-- MESSAGE -->
            <p class="text-muted mb-4">
                Une erreur inattendue s'est produite sur le serveur.
                Veuillez réessayer dans quelques instants.
            </p>

            <!-- ACTIONS -->
            <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">

                <a
                    href="{{ url_for('index') }}"
                    class="btn btn-primary btn-lg"
                >
                    <i class="bi bi-house-fill me-2"></i>
                    Retour à l'accueil
                </a>

                <button
                    onclick="location.reload()"
                    class="btn btn-outline-danger btn-lg"
                >
                    <i class="bi bi-arrow-clockwise me-2"></i>
                    Réessayer
                </button>

            </div>

        </div>

    </div>

</div>
{% endblock %}

{% block extra_css %}
<style>

.error-page {
    min-height: calc(100vh - 180px);

    display: flex;
    align-items: center;
    justify-content: center;

    background:
        linear-gradient(
            135deg,
            #f8f9fa 0%,
            #eef2f7 100%
        );

    padding: 40px 15px;
}

.error-box {
    max-width: 620px;

    margin: auto;

    background: white;

    border-radius: 22px;

    padding: 50px 35px;

    text-align: center;
}

.error-icon {
    font-size: 5rem;
    margin-bottom: 10px;
}

.error-code {
    font-size: 6rem;
    font-weight: 800;

    margin-bottom: 10px;
}

.error-box p {
    font-size: 1.05rem;
}

@media (max-width: 576px) {

    .error-box {
        padding: 35px 20px;
    }

    .error-code {
        font-size: 4.5rem;
    }

    .error-icon {
        font-size: 4rem;
    }

}

</style>
{% endblock %}
